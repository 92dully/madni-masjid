<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    Madni Masjid favicon
    ====================
    Dark emerald rounded square + classic crescent-and-star motif.
    Drawn with three plain circles to keep it crisp at every size:
      - White outer circle  → the moon's body
      - Emerald cutout      → the bite that turns the moon into a crescent
        (same colour as the background, so it "disappears" into the rect)
      - Small white circle  → the star sitting in the crescent's opening
  -->
  <rect width="64" height="64" rx="12" fill="#065f46"/>
  <circle cx="30" cy="32" r="16" fill="white"/>
  <circle cx="36" cy="29" r="13" fill="#065f46"/>
  <circle cx="48" cy="20" r="3"  fill="white"/>
</svg>
